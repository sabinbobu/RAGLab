services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOGFIRE_TOKEN=${LOGFIRE_TOKEN}
      - LOG_LEVEL=INFO
    volumes:
      # persist ChromaDB and SQLite outside the container
      - ./.chroma:/app/.chroma
      - ./raglab.db:/app/raglab.db
